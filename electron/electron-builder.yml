# ================= electron-builder 配置 =================
# PodGist 桌面应用打包配置

# 打包目标平台
target:
  - target: nsis
    arch:
      - x64
  - target: dmg
    arch:
      - arm64

# App 元数据（icon 必须在根层级，build key 已废弃）
appId: com.podgist.desktop
productName: PodGist
copyright: Copyright © 2026 PodGist Team
icon: assets/icon

# 发布配置 - 已禁用，改由 workflow 通过 gh CLI 手动上传
# publish:
#   provider: github
#   owner: TobySKKGD
#   repo: PodGist
#   releaseType: draft

# 构建产物输出目录
directories:
  output: ../release/${version}

# NSIS Windows 安装包配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PodGist
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  installerIcon: assets/icon.ico

# DMG macOS 安装包配置
dmg:
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  window:
    width: 600
    height: 400
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ================= macOS 配置 =================
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: assets/entitlements.plist
  entitlementsInherit: assets/entitlements.plist
  icon: assets/Icon.icns
  target:
    - dmg
  # macOS: 使用 Python venv（python_venv 在 prebuild 时已准备）
  files:
    - src/**/*
    - package.json
    - backend/**/*
    - api.py
    - requirements.txt
    - frontend-dist/**/*
  asarUnpack:
    - backend/**/*
    - api.py
    - requirements.txt
    - frontend-dist/**/*
  extraResources:
    - from: resources/ffmpeg
      to: ffmpeg
      filter:
        - "**/*"
    - from: resources/python_venv
      to: python_venv
      filter:
        - "**/*"

# ================= Windows 配置 =================
win:
  icon: assets/icon.ico
  forceCodeSigning: false
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  # Windows: 使用 PyInstaller 打包的 api-engine（后端已编译为本地二进制）
  files:
    - src/**/*
    - package.json
    - frontend-dist/**/*
  asarUnpack:
    - frontend-dist/**/*
  extraResources:
    - from: resources/ffmpeg
      to: ffmpeg
      filter:
        - "**/*"
    - from: dist/api
      to: api
      filter:
        - "**/*"
