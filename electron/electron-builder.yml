# ================= electron-builder 配置 =================
# PodGist 桌面应用打包配置

# 打包目标平台
# Windows: nsis 安装包
# macOS: dmg 磁盘镜像
target:
  - target: nsis
    arch:
      - x64
  - target: dmg
    arch:
      - arm64

# App 元数据
appId: com.podgist.app
productName: PodGist
copyright: Copyright © 2024 PodGist Team

# 发布配置 - 自动发布到 GitHub Release
publish:
  provider: github
  owner: TobyKSKGD
  repo: PodGist
  releaseType: draft  # draft 表示先创建草稿，验证后再发布

# NSIS Windows 安装包配置
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PodGist
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# DMG macOS 安装包配置
dmg:
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  window:
    width: 600
    height: 400
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# 构建产物输出目录
directories:
  output: ../release/${version}

# 打包文件
files:
  - src/**/*
  - package.json
  - ../frontend/dist/**/*
  - ../api.py
  - ../backend/**/*
  - ../requirements.txt

# 额外资源（不打包进 asar，直接复制到 resources）
extraResources:
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"
  - from: resources/python_venv
    to: python_venv
    filter:
      - "**/*"

# macOS 配置
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: assets/entitlements.plist
  entitlementsInherit: assets/entitlements.plist
  icon: assets/icon.icns
  target:
    - dmg

# Windows 配置
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

