name: Build Windows Installer

on:
  push:
    tags:
      - 'v*-win*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build'
        required: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== Step 1: 前端构建 ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ========== Step 2: 准备 Python 环境 ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Download Windows FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -o"ffmpeg_temp"
          mkdir -p electron/resources/ffmpeg
          cp ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/*.exe electron/resources/ffmpeg/
        shell: bash

      - name: Install Python dependencies
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      # ========== Step 3: 预构建 ==========
      - name: Run prebuild
        run: |
          cd electron
          npm install
          node scripts/prebuild.js

      # ========== Step 4: PyInstaller 打包后端 ==========
      - name: Package backend with PyInstaller
        run: |
          pyinstaller --noconsole --onedir `
            --log-level=DEBUG `
            --exclude-module matplotlib `
            --exclude-module tkinter `
            --exclude-module PyQt5 `
            backend/api.spec > pyinstaller_build.log 2>&1
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: Upload PyInstaller Log
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-log
          path: pyinstaller_build.log

      - name: Verify PyInstaller output
        run: |
          dir backend\dist\api /b
          echo "PyInstaller output exists"

      # ========== Step 5: electron-builder 打包 Windows ==========
      - name: Build Windows installer
        run: npx electron-builder --win --dir
        working-directory: ${{ github.workspace }}/electron
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verify output
        run: |
          dir electron\release\1.0.0\win-unpacked /b | head -10

      # ========== Step 6: 列出所有生成物 ==========
      - name: List all outputs
        run: |
          echo "=== Windows executable ==="
          dir /s /b electron\release\1.0.0\*.exe 2>nul
          echo "=== All files in release ==="
          dir /s electron\release\1.0.0\*.exe 2>nul

      # ========== Step 7: 上传到 GitHub Release v1.0.0-windows ==========
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            electron/release/1.0.0/*.exe
            electron/release/1.0.0/win-unpacked/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
