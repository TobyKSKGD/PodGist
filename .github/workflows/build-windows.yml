name: Build Windows Installer

on:
  # 支持推 Tag 自动触发
  push:
    tags:
      - 'v*'
  # ✨ 核心升级：支持在 GitHub 网页上手动点击运行，并指定上传到哪个 Release
  workflow_dispatch:
    inputs:
      target_tag:
        description: '你要上传的目标 Release Tag (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-upload:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Download Windows FFmpeg
        shell: bash
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -o"ffmpeg_temp"
          mkdir -p electron/resources/ffmpeg
          cp ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/*.exe electron/resources/ffmpeg/

      - name: Install Python dependencies
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Package backend with PyInstaller
        shell: bash
        # 直接使用你的 spec 文件进行 onedir 打包
        run: pyinstaller --log-level=INFO backend/api.spec

      - name: Copy PyInstaller output to electron
        shell: bash
        run: |
          mkdir -p electron/dist
          cp -r dist/api electron/dist/api

      - name: Run prebuild & Build Windows installer
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        working-directory: ${{ github.workspace }}/electron
        run: |
          npm install
          node scripts/prebuild.js
          npx electron-builder --win --dir

      - name: Upload to Release via GitHub CLI
        shell: bash
        env:
          # 注入 Boss 提供的最高权限 Token
          GITHUB_TOKEN: ${{ secrets.PODGIST_PAT }}
        run: |
          # 决定目标 Tag：如果是手动运行则用输入的 Tag，否则用触发的 Tag
          TAG_NAME="${{ github.event.inputs.target_tag || github.ref_name }}"
          echo "==== 准备强行上传到 Release: $TAG_NAME ===="

          # 精准拦截：只抓 release 目录下的安装包 (屏蔽 win-unpacked 里的碎文件)
          for file in release/*.exe; do
            if [ -f "$file" ]; then
              echo "正在上传: $file"
              # --clobber: 如果线上已有同名文件，直接无情覆盖，绝不报 403 错误
              gh release upload "$TAG_NAME" "$file" --clobber
            fi
          done
          echo "==== 上传完成！ ===="
