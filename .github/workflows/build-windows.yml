name: Build Windows Installer

on:
  push:
    tags:
      - 'v*-win*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build'
        required: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== Step 1: 前端构建 ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ========== Step 2: 准备 Python 环境 ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Download Windows FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -o"ffmpeg_temp"
          mkdir -p electron/resources/ffmpeg
          cp ffmpeg_temp/ffmpeg-master-latest-win64-gpl/bin/*.exe electron/resources/ffmpeg/
        shell: bash

      - name: Install Python dependencies
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      # ========== Step 3: 预构建 ==========
      - name: Run prebuild
        run: |
          cd electron
          npm install
          node scripts/prebuild.js

      # ========== Step 4: PyInstaller 打包后端 ==========
      # 注意：--onedir/--noconsole 等选项已在 .spec 文件中定义，命令行不能再传
      - name: Package backend with PyInstaller
        run: pyinstaller --log-level=DEBUG backend/api.spec > pyinstaller_build.log 2>&1
        working-directory: ${{ github.workspace }}
        shell: bash
        continue-on-error: true

      - name: Upload PyInstaller Log
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-log
          path: pyinstaller_build.log

      # PyInstaller 输出到 dist/api（repo 根目录），复制到 electron/dist/api 供 electron-builder 打包
      - name: Copy PyInstaller output to electron
        run: |
          mkdir -p electron/dist
          cp -r dist/api electron/dist/api
        working-directory: ${{ github.workspace }}
        shell: bash
        continue-on-error: true

      # ========== Step 5: electron-builder 打包 Windows ==========
      - name: Build Windows installer
        run: npx electron-builder --win --dir
        working-directory: ${{ github.workspace }}/electron
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ========== Step 6: 验证输出存在 ==========
      - name: Verify output exists
        run: ls -la release/1.0.0/win-unpacked/PodGist.exe
        working-directory: ${{ github.workspace }}
        shell: bash

      # ========== Step 7: 上传到 draft release（由 tag 触发自动创建）============
      # 只上传根目录的 PodGist.exe，不要递归上传几百个内部 .exe
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            release/1.0.0/win-unpacked/PodGist.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
