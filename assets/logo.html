<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PodGist Logo</title>
    <style>
        body {
            /* 模拟一个极简、专业的软件暗色背景 */
            background-color: #12141A;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .logo-wrapper {
            width: 400px;
            /* 随意放大缩小，体验极致几何清晰度 */
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
            <defs>
                <linearGradient id="gradP" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#001A9C" />
                    <stop offset="100%" stop-color="#008080" />
                </linearGradient>

                <linearGradient id="gradG" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00E5FF" />
                    <stop offset="100%" stop-color="#B2FF59" />
                </linearGradient>

                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>

                <filter id="super-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <g transform="translate(0, -10)" filter="url(#neonGlow)">
                <path d="M 120 190 L 120 60 L 160 60 A 50 50 0 0 1 160 160 L 120 160"
                      fill="none" 
                      stroke="url(#gradP)" 
                      stroke-width="32" 
                      stroke-linecap="round" 
                      stroke-linejoin="round"/>

                <path d="M 230 110 L 280 110 A 50 50 0 1 1 260 70"
                      fill="none" 
                      stroke="url(#gradG)" 
                      stroke-width="32" 
                      stroke-linecap="round" 
                      stroke-linejoin="round"/>

                <circle cx="260" cy="70" r="14" fill="#FFFFFF" filter="url(#super-glow)"/>
            </g>
        </svg>
    </div>

</body>
</html>
